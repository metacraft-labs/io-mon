# Build policy for the macOS interpose/body-patch shim.
#
# The shim is injected (DYLD_INSERT_LIBRARIES) into arbitrary host programs and its
# hooks run in hostile contexts (notably INSIDE libmalloc). io-mon compiles it as
# close to plain C as its feature set allows, to shrink the compiler-injected
# thread-local / runtime surface. See docs/shim-build-policy.md and
# nim-stackable-hooks/docs/compilation-settings.md for the full rationale.
#
# NOTE: this does not by itself make any specific hostile hook safe — a code path
# reachable from inside libmalloc must still touch NO thread-local (see the mmap
# gate in repro_wrap_mmap). These settings remove the compiler-injected threadvars
# (framePtr / signal machinery) from every OTHER hook.

--stackTrace:off      # no per-proc `framePtr` threadvar push; a shim needs no Nim traces
--lineTrace:off
-d:noSignalHandler    # a shim must NOT install signal handlers (they clobber the host's)
--mm:arc              # deterministic refcounting, no background cycle-collector thread

# We deliberately KEEP --exceptions:goto (the default): the writer/codec use
# exceptions for fragment-flush error handling, so --exceptions:quirky would make
# those silently unsound. The residual (entering a Nim proc that touches the
# nimInErrorMode threadvar from a hostile context) is handled structurally by
# keeping hostile paths in C, not by a compiler setting.

# ROUND-5 P2 — allow the single undefined `_SecRandomCopyBytes` reference (the
# __DATA,__interpose replacee for the Security.framework entropy hook) to link
# WITHOUT adding Security.framework to the shim's dependency closure. The symbol
# is declared `weak_import` in macos_interpose.nim, so at load dyld resolves this
# targeted dynamic-lookup reference to the genuine address when the monitored
# program links Security.framework (the tuple then fires) and to NULL otherwise
# (dyld interposes nothing). `-U <sym>` scopes the allowance to THIS symbol only,
# so no broad `-undefined dynamic_lookup` and no extra load command is introduced.
# CCRandomGenerateBytes needs no such flag: libcommonCrypto is part of libSystem,
# which the shim already links, so that symbol resolves at link time.
--passL:"-Wl,-U,_SecRandomCopyBytes"
